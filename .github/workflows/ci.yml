name: CI

on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master, production]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_HOST: https://api.colors-game.ru
          VITE_APP_HOST: https://colors-game.ru
          VITE_MULTIPLAYER_HOST: https://api.colors-game.ru/game
          VITE_MULTIPLAYER_WS: wss://api.colors-game.ru/game
